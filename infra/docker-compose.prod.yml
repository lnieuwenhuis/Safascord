services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks: [appnet]
    # No ports exposed in production

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pgbouncer
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 50
    depends_on: [postgres]
    networks: [appnet]
    # No ports exposed in production

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks: [appnet]
    # No ports exposed in production

  minio:
    image: minio/minio
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://storage.${DOMAIN_NAME}
      MINIO_BROWSER_REDIRECT_URL: https://console.${DOMAIN_NAME}
    volumes:
      - minio_data:/data
    networks: [appnet]
    expose:
      - "9000"
      - "9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`storage.${DOMAIN_NAME}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=myresolver"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`console.${DOMAIN_NAME}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=myresolver"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  api:
    image: ${DOCKER_REGISTRY:-myregistry}/api:latest
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGINS: https://${DOMAIN_NAME}
      REALTIME_BASE_HTTP: http://realtime:4001
      REALTIME_BASE_WS: ${REALTIME_BASE_WS:-/ws}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID}
      WORKOS_API_KEY: ${WORKOS_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: uploads
      S3_PUBLIC_URL: https://storage.${DOMAIN_NAME}
      PROXY_UPLOADS: "true"
      API_URL: https://${DOMAIN_NAME}
    depends_on: [pgbouncer, redis, minio]
    networks: [appnet]
    expose:
      - "4000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.services.api.loadbalancer.server.port=4000"

  realtime:
    image: ${DOCKER_REGISTRY:-myregistry}/realtime:latest
    build:
      context: ../realtime
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 4001
      JWT_SECRET: ${JWT_SECRET}
      WS_ALLOWED_ORIGINS: https://${DOMAIN_NAME}
    depends_on: [redis]
    networks: [appnet]
    expose:
      - "4001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls.certresolver=myresolver"
      - "traefik.http.services.ws.loadbalancer.server.port=4001"

  frontend:
    image: ${DOCKER_REGISTRY:-myregistry}/frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: frontend
    restart: always
    networks: [appnet]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      # - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      # - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_MYRESOLVER_ACME_EMAIL=${ACME_EMAIL}
    env_file:
      - ../.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - letsencrypt:/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks: [appnet]
    depends_on: [frontend, api, realtime, minio]

networks:
  appnet:

volumes:
  pgdata:
  uploads_data:
  letsencrypt:
  minio_data:
